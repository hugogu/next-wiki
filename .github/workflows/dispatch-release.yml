# On tag push to next-wiki, dispatch a repository_dispatch event to
# hugugu/next-wiki-deploy with the tag name. Lets us tag in the source
# repo and have the deploy repo take over from there.
#
# Uses the workflow's automatic GITHUB_TOKEN (no PAT secret needed) — the
# default token has the same org-wide scope as the workflow runner, which
# is enough to dispatch within the hugugu org. If this stops working after
# a future GitHub Actions permission tightening, fall back to a PAT with
# `repo:dispatch` scope on both repos.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

# Limit the workflow's default token to the actions we actually need.
# `actions: write` is required for repository_dispatch creation; without
# this block, GITHUB_TOKEN is read-only and dispatch returns 403.
permissions:
  contents: read
  actions: write

jobs:
  notify-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch to next-wiki-deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ github.token }}
          repository: hugugu/next-wiki-deploy
          event-type: next-wiki-release
          client-payload: '{"tag": "${{ github.ref_name }}"}'
