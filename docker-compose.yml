services:
  db:
    image: postgres:16-alpine
    container_name: next-wiki-db
    environment:
      POSTGRES_USER: wiki
      POSTGRES_PASSWORD: wiki
      POSTGRES_DB: wiki
    volumes:
      - next-wiki-pgdata:/var/lib/postgresql/data
    # DB is reachable inside the compose network only; expose loopback port for local dev/tests.
    ports:
      - "127.0.0.1:15433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wiki -d wiki"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runner
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-alpine}
    container_name: next-wiki-web
    environment:
      DATABASE_URL: postgresql://wiki:wiki@db:5432/wiki
      APP_URL: ${APP_URL:-http://localhost:${WEB_PORT:-3000}}
      NODE_ENV: ${NODE_ENV:-production}
      NEXT_WIKI_SEED: 'true'
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - next-wiki-pgdata-shared:/tmp # ensure shared data not lost during restarts

volumes:
  next-wiki-pgdata:
  next-wiki-pgdata-shared:
